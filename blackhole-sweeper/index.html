<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブラックホール・スイーパー</title>
    <!-- SEO: hajikkogurashi-minigame -->
    <meta name="description" content="線でバグを囲んで一網打尽にする、スマホ対応の一筆書きアクションゲームです。Corner Neighborのブラウザミニゲームとして公開中。">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://hajikkoroom.xsrv.jp/blackhole-sweeper/">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Corner Neighbor">
    <meta property="og:title" content="ブラックホール・スイーパー | Corner Neighbor">
    <meta property="og:description" content="線でバグを囲んで一網打尽にする、スマホ対応の一筆書きアクションゲームです。Corner Neighborのブラウザミニゲームとして公開中。">
    <meta property="og:url" content="https://hajikkoroom.xsrv.jp/blackhole-sweeper/">
    <meta property="og:image" content="https://hajikkoroom.xsrv.jp//assets/images/blackhole_sweeper_thumbnail_1779194532152.png">
    <meta property="og:image:alt" content="ブラックホール・スイーパー | Corner Neighbor">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ブラックホール・スイーパー | Corner Neighbor">
    <meta name="twitter:description" content="線でバグを囲んで一網打尽にする、スマホ対応の一筆書きアクションゲームです。Corner Neighborのブラウザミニゲームとして公開中。">
    <meta name="twitter:image" content="https://hajikkoroom.xsrv.jp//assets/images/blackhole_sweeper_thumbnail_1779194532152.png">
    <!-- /SEO: hajikkogurashi-minigame -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- キャンバス -->
        <canvas id="game-canvas"></canvas>

        <!-- UIレイヤー -->
        <div id="ui-layer">
            <!-- HUD -->
            <div id="hud" class="hidden">
                <div class="hud-left">
                    <span class="hud-label">SCORE</span>
                    <span id="score-value">0</span>
                </div>
                <div class="hud-right">
                    <span class="hud-label">LIFE</span>
                    <div id="life-container">
                        <span class="heart active">❤️</span>
                        <span class="heart active">❤️</span>
                        <span class="heart active">❤️</span>
                    </div>
                </div>
            </div>

            <!-- 操作ヒント -->
            <div id="hint-text" class="hint-text hidden">画面をなぞってターゲットを囲め！</div>
            <div id="tutorial-overlay" class="tutorial-overlay hidden">
                <div class="tutorial-loop">
                    <span class="tutorial-dot"></span>
                </div>
            </div>

            <!-- スタート画面 -->
            <div id="start-screen" class="screen active cyber-panel">
                <div class="title-container">
                    <h1 class="main-title">BLACKHOLE<br><span class="highlight">SWEEPER</span></h1>
                </div>
                <div class="instruction">
                    <p><strong>【ルール】</strong></p>
                    <p>画面をスワイプして<span class="text-cyan">線</span>を引き、<br>ターゲットをぐるっと<span class="text-cyan">囲んで</span>吸い込め！</p>
                    <p>一気に囲むと<span class="text-yellow">コンボボーナス！</span></p>
                    <p class="warning">引いている途中の線にターゲットがぶつかるとダメージ！</p>
                </div>
                <div class="sound-mute-container" style="margin-top: 15px; margin-bottom: 15px; text-align: center; width: 100%;">
                    <label class="mute-label" style="cursor: pointer; font-size: 1.1rem; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
                        <input type="checkbox" id="sound-mute-toggle" style="width: 18px; height: 18px; cursor: pointer;">
                        <span class="mute-text" style="font-weight: bold; color: #00ffcc; font-family: 'M PLUS Rounded 1c', sans-serif;">🔇 消音 (ミュート)</span>
                    </label>
                </div>
                <div class="menu-buttons-vertical">
                    <button id="start-btn" class="cyber-btn">SWEEP START</button>
                    <button id="trophy-btn" class="cyber-btn secondary">🏆 称号図鑑</button>
                    <button id="menu-btn-title" class="cyber-btn secondary" style="margin-top: 10px;">広場に戻る</button>
                </div>
            </div>

            <!-- リザルト画面 -->
            <div id="result-screen" class="screen result-panel">
                <div class="result-box">
                    <h2 class="result-title">GAME OVER<br><span class="sub-title">（シールド大破）</span></h2>
                    
                    <div class="score-container">
                        <p class="score-label">スコア</p>
                        <p id="final-score" class="final-score">0</p>
                        <p class="best-score-label">BEST: <span id="best-score-value">--</span></p>
                        <p id="new-record-badge" class="new-record blink hidden">NEW RECORD!!</p>
                    </div>

                    <div class="rank-container">
                        <p class="rank-label">今回の評価</p>
                        <p id="rank-text" class="rank-text">新人火消し</p>
                        <p id="next-achievement-text" class="next-achievement-text">次: 初回吸引成功 / 300pt</p>
                    </div>

                    <div class="btn-group">
                        <button id="retry-btn" class="cyber-btn primary">再挑戦 (RETRY)</button>
                        <button id="share-btn" class="cyber-btn x-share">𝕏 結果をシェア</button>
                        <button id="menu-btn" class="cyber-btn secondary">メニューへ戻る</button>
                    </div>
                </div>
            </div>

            <!-- 称号図鑑モーダル -->
            <div id="achievements-modal" class="modal hidden">
                <div class="modal-content cyber-panel">
                    <h2 class="modal-title">🏆 SWEEPER 称号図鑑</h2>
                    <div class="achievements-list" id="achievements-list">
                        <!-- 動的に称号プレートが生成されます -->
                    </div>
                    <button id="close-modal-btn" class="cyber-btn">閉じる</button>
                </div>
            </div>

            <!-- 称号獲得リアルタイムトースト -->
            <div id="toast-container" class="toast-container"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
