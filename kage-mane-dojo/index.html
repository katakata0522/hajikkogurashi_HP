<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>影まね道場 | はじっこぐらし</title>
  <meta name="description" content="師範の型を覚えて同じ順番で入力する、記憶と集中のミニゲーム。">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://hajikkoroom.xsrv.jp/kage-mane-dojo/">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="game-shell" id="gameShell">
    <header class="game-header">
      <a class="back-link" href="../minigames.html">ミニゲーム広場</a>
      <div class="record-strip" aria-label="記録">
        <span>BEST <strong id="bestLesson">0</strong></span>
        <span>STREAK <strong id="currentStreak">0</strong></span>
      </div>
    </header>

    <section class="screen title-screen active" id="titleScreen" aria-label="タイトル画面">
      <div class="moon" aria-hidden="true"></div>
      <div class="title-mark">影</div>
      <h1>影まね<br>道場</h1>
      <p>師範の型を覚え、弟子として同じ順に打ち返せ。</p>
      <button class="primary-button" id="startButton" type="button">稽古を始める</button>
      <div class="howto">
        <span>師範の動きが終わったら入力</span>
        <span>矢印キー / WASD / 方向札</span>
      </div>
    </section>

    <section class="screen play-screen" id="playScreen" aria-label="稽古画面">
      <div class="hud">
        <div><span>LESSON</span><strong id="lessonLabel">1</strong></div>
        <div><span>手数</span><strong id="lengthLabel">3</strong></div>
        <div><span>入力</span><strong id="progressLabel">0/3</strong></div>
      </div>

      <div class="dojo-scene" id="dojoScene">
        <div class="dojo-floor" aria-hidden="true"></div>
        <div class="status-text" id="statusText" aria-live="polite">師範の型を見る</div>

        <div class="character master" id="master">
          <div class="nameplate">師範</div>
          <div class="body"><span class="head"></span><span class="torso"></span><span class="arm left"></span><span class="arm right"></span></div>
        </div>

        <div class="character student" id="student">
          <div class="nameplate">弟子</div>
          <div class="body"><span class="head"></span><span class="torso"></span><span class="arm left"></span><span class="arm right"></span></div>
        </div>

        <div class="direction-flash" id="directionFlash" aria-hidden="true">上</div>
      </div>

      <div class="input-pad" id="inputPad" aria-label="方向入力">
        <button type="button" class="dir-button up" data-direction="up" aria-label="上">上</button>
        <button type="button" class="dir-button right" data-direction="right" aria-label="右">右</button>
        <button type="button" class="dir-button down" data-direction="down" aria-label="下">下</button>
        <button type="button" class="dir-button left" data-direction="left" aria-label="左">左</button>
      </div>
    </section>

    <section class="screen result-screen" id="resultScreen" aria-label="結果画面">
      <div class="result-panel">
        <p class="result-title" id="resultTitle">稽古終了</p>
        <div class="result-score"><span id="resultLesson">0</span><small>段</small></div>
        <p class="rank-text" id="rankText">見習い</p>
        <p class="result-comment" id="resultComment">もう一度、型を見直しましょう。</p>
        <div class="result-actions">
          <button class="primary-button" id="retryButton" type="button">もう一度</button>
          <button class="secondary-button" id="shareButton" type="button">結果を共有</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">コピーしました</div>
  <script src="./script.js"></script>
</body>
</html>
