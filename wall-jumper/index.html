<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ウォールジャンパー | はじっこぐらし</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiyopop+One&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.9.2">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui-layer">
            <h1 id="title">WALL JUMPER</h1>
            <p id="instruction">画面をクリックしてジャンプ！<br>壁を蹴って上に登ろう！<br>トゲに当たると即ゲームオーバー！</p>
            <button id="start-btn">ゲームスタート</button>
            
            <div id="hud">
                <div id="score-container">
                    <span class="label">DISTANCE</span>
                    <div id="score-display">0m</div>
                </div>
                <div id="best-container">
                    <span class="label">BEST</span>
                    <div id="best-time-display">--m</div>
                </div>
            </div>
            
            <button id="pause-btn" style="display: none;"><span>||</span></button>
            
            <div id="pause-screen" style="display: none;">
                <h2>PAUSE</h2>
                <button id="resume-btn">続ける</button>
                <button id="quit-btn" class="secondary">やめる</button>
            </div>
            
            <div id="milestone-display" style="display: none;">50m 突破!!</div>
            <div id="in-game-new-record" style="display: none;">NEW RECORD!</div>

            <div id="game-clear">
                <div class="clear-card">
                    <h2>GAME CLEAR!!</h2>
                    <h3 id="new-record" style="display: none;">★ NEW RECORD ★</h3>
                    <div class="result-score">
                        <span class="label">RESULT</span>
                        <div class="value"><span id="clear-time">0</span>m</div>
                    </div>
                    <button id="restart-btn">リトライ</button>
                    <a href="/minigames.html" class="back-link">ミニゲーム広場へ戻る</a>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js?v=1.9.2"></script>
</body>
</html>
