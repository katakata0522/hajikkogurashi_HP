<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ウォールジャンパー | はじっこぐらし</title>
    <!-- SEO: hajikkogurashi-minigame -->
    <meta name="description" content="壁を使って跳び回る、はじっこぐらし制作のブラウザアクションミニゲームです。">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://hajikkoroom.xsrv.jp/wall-jumper/">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="はじっこぐらし公式ホームページ">
    <meta property="og:title" content="ウォールジャンパー | はじっこぐらし">
    <meta property="og:description" content="壁を使って跳び回る、はじっこぐらし制作のブラウザアクションミニゲームです。">
    <meta property="og:url" content="https://hajikkoroom.xsrv.jp/wall-jumper/">
    <meta property="og:image" content="https://hajikkoroom.xsrv.jp//assets/images/banner.webp">
    <meta property="og:image:alt" content="ウォールジャンパー | はじっこぐらし">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ウォールジャンパー | はじっこぐらし">
    <meta name="twitter:description" content="壁を使って跳び回る、はじっこぐらし制作のブラウザアクションミニゲームです。">
    <meta name="twitter:image" content="https://hajikkoroom.xsrv.jp//assets/images/banner.webp">
    <!-- /SEO: hajikkogurashi-minigame -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui-layer">
            <h1 id="title">WALL JUMPER</h1>
            <p id="instruction">画面をクリックしてジャンプ！<br>壁を蹴ってどこまでも登ろう！<br>トゲに当たるとその場でリトライ！</p>
            <div class="sound-mute-container" id="sound-mute-container" style="margin-top: 15px; margin-bottom: 15px; text-align: center; width: 100%;">
                <label class="mute-label" style="cursor: pointer; font-size: 1.1rem; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
                    <input type="checkbox" id="sound-mute-toggle" style="width: 18px; height: 18px; cursor: pointer;">
                    <span class="mute-text" style="font-weight: bold; color: #fff; font-family: 'DotGothic16', 'Noto Sans JP', sans-serif;">🔇 消音 (ミュート)</span>
                </label>
            </div>
            <button id="start-btn">ゲームスタート</button>
            <button id="menu-btn-title" class="secondary" style="display: block; margin: 10px auto 0;">広場に戻る</button>
            <div id="hud">
                <div class="label">HEIGHT</div>
                <div id="score-display">0m</div>
                <div id="best-time-display">BEST --m</div>
            </div>
            
            <button id="pause-btn" aria-label="一時停止">||</button>
            
            <div id="pause-screen">
                <h2>PAUSE</h2>
                <button id="resume-btn">ゲームに戻る</button>
                <button id="quit-btn" class="secondary">タイトルへ</button>
                <button id="menu-btn-pause" class="secondary" style="margin-top: 10px;">広場に戻る</button>
            </div>
            
            <div id="milestone-display">50m 突破!!</div>
            
            <div id="in-game-new-record">NEW RECORD!</div>
            <div id="run-flash"></div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
