<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ウォールジャンパー | はじっこぐらし</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui-layer">
            <h1 id="title">WALL JUMPER</h1>
            <p id="instruction">画面をクリックしてジャンプ！<br>壁を蹴ってどこまでも登ろう！<br>トゲに当たるとその場でリトライ！</p>
            <button id="start-btn">ゲームスタート</button>
            <div id="hud" style="display: none;">
                <div class="label">HEIGHT</div>
                <div id="score-display">0m</div>
                <div id="best-time-display">BEST --m</div>
            </div>
            
            <button id="pause-btn" style="display: none;" aria-label="一時停止">||</button>
            
            <div id="pause-screen">
                <h2>PAUSE</h2>
                <button id="resume-btn">ゲームに戻る</button>
                <button id="quit-btn" class="secondary">タイトルへ</button>
            </div>
            
            <div id="milestone-display">50m 突破!!</div>
            
            <div id="in-game-new-record">NEW RECORD!</div>
            <div id="run-flash"></div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
