name: Deploy Static Site to Xserver

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - '.github/**'

concurrency:
  group: deploy-hajikkogurashi-hp-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect kanji-slicer changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          kanji_slicer_changed="false"

          changed_files="$(jq -r '[.commits[]? | (.added[]?, .modified[]?, .removed[]?)] | unique[]?' "$GITHUB_EVENT_PATH" 2>/dev/null || true)"
          if [ -z "$changed_files" ]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" 2>/dev/null || true)"
          fi

          echo "Changed files:"
          if [ -n "$changed_files" ]; then
            echo "$changed_files"
          else
            echo "(none detected)"
            echo "No changed files were detected, so deploying kanji-slicer as a fail-safe."
            kanji_slicer_changed="true"
          fi

          if [ -n "$changed_files" ] && echo "$changed_files" | grep -qE '^kanji-slicer/'; then
            kanji_slicer_changed="true"
          fi

          echo "kanji_slicer_changed=$kanji_slicer_changed" >> "$GITHUB_OUTPUT"
          echo "Kanji slicer extra deploy: $kanji_slicer_changed"

      - name: Validate static site
        run: |
          pwsh -File ./scripts/static-site-smoke-test.ps1
          pwsh -File ./scripts/home-asset-smoke-test.ps1
          pwsh -File ./scripts/structure-smoke-test.ps1
          pwsh -File ./scripts/local-reference-check.ps1

      - name: Generate sitemap.xml
        run: pwsh -File ./scripts/generate-sitemap.ps1

      - name: Setup SSH
        env:
          XS_SSH_KEY: ${{ secrets.XS_SSH_KEY }}
          XS_HOST: ${{ secrets.XS_HOST }}
          XS_PORT: ${{ secrets.XS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$XS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$XS_PORT" -H "$XS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || \
            echo "::warning::ssh-keyscan failed; rsync will use StrictHostKeyChecking=accept-new"

      - name: Deploy to Xserver via Rsync
        env:
          XS_HOST: ${{ secrets.XS_HOST }}
          XS_PORT: ${{ secrets.XS_PORT }}
          XS_USER: ${{ secrets.XS_USER }}
          XS_REMOTE_DIR: ${{ secrets.XS_REMOTE_DIR }}
        run: |
          set -euo pipefail
          # 静的ファイルだけを公開先へ同期する
          rsync -avz --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "scripts/" \
            --exclude "*.md" \
            --exclude ".gitignore" \
            --exclude ".gitlab-ci.yml" \
            -e "ssh -p $XS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ $XS_USER@$XS_HOST:$XS_REMOTE_DIR

      - name: Deploy kanji-slicer to playpoint-sim.com
        if: steps.changes.outputs.kanji_slicer_changed == 'true'
        env:
          XS_HOST: ${{ secrets.XS_HOST }}
          XS_PORT: ${{ secrets.XS_PORT }}
          XS_USER: ${{ secrets.XS_USER }}
        run: |
          set -euo pipefail
          rsync -avz --delete \
            -e "ssh -p $XS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./kanji-slicer/ $XS_USER@$XS_HOST:/home/hajikkoroom/playpoint-sim.com/public_html/kanji-slicer/

      - name: SEO deploy confirmation
        if: success()
        run: |
          echo "✅ デプロイ完了 + sitemap.xml 更新済み"
          echo ""
          echo "📋 SEO 状況:"
          echo "  - sitemap.xml がサーバーに配置されました"
          echo "  - Google: Search Console に sitemap を登録済みであれば自動クロールされます"
          echo "  - 参考: https://hajikkoroom.xsrv.jp/sitemap.xml"
