name: Deploy Static Site to Xserver

on:
  push:
    branches:
      - main # または main。リポジトリのデフォルトブランチに合わせてください

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate static site
        run: |
          pwsh -File ./scripts/static-site-smoke-test.ps1
          pwsh -File ./scripts/home-asset-smoke-test.ps1
          pwsh -File ./scripts/structure-smoke-test.ps1
          pwsh -File ./scripts/local-reference-check.ps1

      - name: Generate Sitemap
        run: pwsh -File ./scripts/generate-sitemap.ps1

      - name: Deploy to Xserver via Rsync
        env:
          XS_SSH_KEY: ${{ secrets.XS_SSH_KEY }}
          XS_HOST: ${{ secrets.XS_HOST }}
          XS_PORT: ${{ secrets.XS_PORT }}
          XS_USER: ${{ secrets.XS_USER }}
          XS_REMOTE_DIR: ${{ secrets.XS_REMOTE_DIR }}
        run: |
          # SSHディレクトリの準備
          mkdir -p ~/.ssh
          echo "$XS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 既知のホストとして登録（対話モード回避）
          ssh-keyscan -p $XS_PORT -H $XS_HOST >> ~/.ssh/known_hosts

          # 静的ファイルだけを公開先へ同期する
          rsync -avz --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "scripts/" \
            --exclude "*.md" \
            --exclude ".gitignore" \
            --exclude ".gitlab-ci.yml" \
            -e "ssh -p $XS_PORT -i ~/.ssh/id_rsa" \
            ./ $XS_USER@$XS_HOST:$XS_REMOTE_DIR

      - name: Auto SEO Ping to Google
        run: curl -s "https://www.google.com/ping?sitemap=https://hajikkoroom.xsrv.jp/sitemap.xml"
