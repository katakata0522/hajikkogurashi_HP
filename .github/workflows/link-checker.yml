name: Weekly Link Checker Patrol

# 毎週月曜 AM3:00 (JST) = 日曜 18:00 (UTC) に自動実行
# 手動実行も可能
on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    name: 全サイト リンク切れチェック
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check hajikkoroom.xsrv.jp
        id: check_hajikko
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            "https://hajikkoroom.xsrv.jp"
            --max-concurrency 4
            --timeout 15
            --retry-wait-time 5
            --max-retries 2
            --exclude "x.com"
            --exclude "twitter.com"
            --exclude "note.com"
            --exclude "youtube.com"
            --exclude "fonts.googleapis.com"
            --exclude "formspree.io"
            --cache
          output: ./lychee-report-hajikko.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check playpoint-sim.com
        id: check_playpoint
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            "https://playpoint-sim.com"
            --max-concurrency 4
            --timeout 15
            --retry-wait-time 5
            --max-retries 2
            --exclude "x.com"
            --exclude "twitter.com"
            --exclude "fonts.googleapis.com"
            --cache
          output: ./lychee-report-playpoint.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check katakatalab.com
        id: check_katakatalab
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            "https://katakatalab.com"
            --max-concurrency 4
            --timeout 15
            --retry-wait-time 5
            --max-retries 2
            --exclude "x.com"
            --exclude "twitter.com"
            --exclude "fonts.googleapis.com"
            --cache
          output: ./lychee-report-katakatalab.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge reports
        run: |
          echo "# 🔗 週次リンクチェック結果" > link-check-results.md
          echo "" >> link-check-results.md
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> link-check-results.md
          echo "" >> link-check-results.md

          for REPORT in lychee-report-hajikko.md lychee-report-playpoint.md lychee-report-katakatalab.md; do
            SITE=$(echo "$REPORT" | sed 's/lychee-report-//;s/\.md//')
            echo "## $SITE" >> link-check-results.md
            echo "" >> link-check-results.md
            if [ -f "$REPORT" ]; then
              cat "$REPORT" >> link-check-results.md
            else
              echo "✅ チェック対象なし、またはエラーなし" >> link-check-results.md
            fi
            echo "" >> link-check-results.md
          done

      - name: Check for errors
        id: has_errors
        run: |
          if grep -qiE "\[error\]|❌|Failed" link-check-results.md 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue if broken links found
        if: steps.has_errors.outputs.found == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 週次リンクチェック: リンク切れ検出"
          content-filepath: link-check-results.md
          labels: |
            bug
            automated
          assignees: katakata0522

      - name: Summary
        run: |
          if [ "${{ steps.has_errors.outputs.found }}" == "true" ]; then
            echo "::warning::⚠️ リンク切れが検出されました。GitHub Issues を確認してください。"
          else
            echo "✅ 全サイトのリンクに問題はありませんでした！"
          fi
