name: Weekly Link Checker Patrol

# 毎週月曜 AM3:00 (JST) = 日曜 18:00 (UTC) に自動実行
# 手動実行も可能
on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    name: 全サイト リンク切れチェック
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lychee link checker
        run: |
          LYCHEE_VERSION="v0.18.0"
          curl -sL "https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/lychee-${LYCHEE_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin
          lychee --version

      - name: Check all sites for broken links
        id: linkcheck
        continue-on-error: true
        run: |
          echo "🔍 全サイトのリンク切れチェックを開始..."
          
          SITES=(
            "https://hajikkoroom.xsrv.jp"
            "https://playpoint-sim.com"
            "https://katakatalab.com"
          )
          
          RESULT_FILE="link-check-results.md"
          FAILED=0
          
          echo "# 🔗 週次リンクチェック結果" > "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          echo "実行日時: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" >> "$RESULT_FILE"
          echo "" >> "$RESULT_FILE"
          
          for SITE in "${SITES[@]}"; do
            echo "---"
            echo "🌐 チェック中: $SITE"
            echo "" >> "$RESULT_FILE"
            echo "## $SITE" >> "$RESULT_FILE"
            echo "" >> "$RESULT_FILE"
            
            # lychee でリンクチェック実行
            # --max-concurrency: 同時接続数を控えめに（サーバー負荷軽減）
            # --timeout: 各リンクのタイムアウト
            # --exclude: SNS等のbot対策があるサイトは除外
            if lychee "$SITE" \
              --max-concurrency 4 \
              --timeout 15 \
              --retry-wait-time 5 \
              --max-retries 2 \
              --exclude "x.com" \
              --exclude "twitter.com" \
              --exclude "note.com" \
              --exclude "youtube.com" \
              --exclude "fonts.googleapis.com" \
              --exclude "formspree.io" \
              --format markdown \
              2>&1 | tee -a "$RESULT_FILE"; then
              echo "✅ $SITE: 問題なし" | tee -a "$RESULT_FILE"
            else
              echo "⚠️ $SITE: リンク切れの可能性あり" | tee -a "$RESULT_FILE"
              FAILED=1
            fi
            echo "" >> "$RESULT_FILE"
          done
          
          echo "has_errors=$FAILED" >> "$GITHUB_OUTPUT"
          echo "---"
          echo "📋 チェック完了！"

      - name: Create Issue if broken links found
        if: steps.linkcheck.outputs.has_errors == '1'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 週次リンクチェック: リンク切れ検出"
          content-filepath: link-check-results.md
          labels: |
            bug
            automated
          assignees: katakata0522

      - name: Summary
        run: |
          if [ "${{ steps.linkcheck.outputs.has_errors }}" == "1" ]; then
            echo "::warning::⚠️ リンク切れが検出されました。GitHub Issues を確認してください。"
          else
            echo "✅ 全サイトのリンクに問題はありませんでした！"
          fi
